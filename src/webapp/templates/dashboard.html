<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VectorVance — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080A0F;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.38);
    --text-tertiary: rgba(255,255,255,0.18);
    --accent-green: #2EE8A5;
    --accent-blue: #5B9EF8;
    --accent-yellow: #F5C842;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: var(--sans); font-weight: 300; overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(30,50,100,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(20,40,80,0.12) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .layout {
    position: relative; z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr 200px;
    grid-template-columns: 1fr 272px;
    grid-template-areas: "nav nav" "main telem" "ctrl ctrl";
    gap: 10px; padding: 10px;
  }

  .glass {
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 18px;
  }

  /* NAV */
  nav { grid-area: nav; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; border-radius: 14px; }

  .nav-logo { display: flex; align-items: baseline; }
  .nav-logo .v1 { font-size: 14px; font-weight: 500; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.14em; }
  .nav-logo .v2 { font-size: 14px; font-weight: 300; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.14em; }

  .nav-center { position: absolute; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.22em; text-transform: uppercase; }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  .status-pill { display: flex; align-items: center; gap: 7px; background: rgba(46,232,165,0.06); border: 1px solid rgba(46,232,165,0.18); border-radius: 999px; padding: 5px 12px 5px 9px; font-family: var(--mono); font-size: 9px; color: var(--accent-green); letter-spacing: 0.1em; text-transform: uppercase; }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: pulse-dot 2.4s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 6px var(--accent-green); } 50% { box-shadow: 0 0 14px var(--accent-green); opacity: 0.6; } }

  .nav-time { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); letter-spacing: 0.08em; }

  /* MAIN VIEWPORT */
  .main-viewport { grid-area: main; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  .viewport-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 0; flex-shrink: 0; }

  .section-label { font-family: var(--mono); font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.22em; text-transform: uppercase; }

  .viewport-badges { display: flex; gap: 6px; }

  .badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-secondary); }
  .badge.live { border-color: rgba(46,232,165,0.25); color: var(--accent-green); background: rgba(46,232,165,0.05); }

  .feed-frame { flex: 1; margin: 12px; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.5); border: 1px solid var(--border); position: relative; display: flex; align-items: center; justify-content: center; }
  .feed-frame img, .feed-frame video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .feed-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .feed-placeholder p { font-family: var(--mono); font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.14em; text-transform: uppercase; }

  .feed-frame::before, .feed-frame::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: rgba(255,255,255,0.2); border-style: solid; z-index: 2; }
  .feed-frame::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .feed-frame::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  .scanline { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px); pointer-events: none; z-index: 1; border-radius: 12px; }

  /* TELEMETRY */
  .telemetry { grid-area: telem; display: flex; flex-direction: column; padding: 16px 14px; gap: 0; overflow: hidden; }

  .telem-block { padding: 10px 0 12px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }

  .telem-label { font-family: var(--mono); font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 5px; }

  .telem-value { font-size: 24px; font-weight: 300; letter-spacing: -0.03em; line-height: 1; }
  .telem-unit { font-size: 11px; color: var(--text-secondary); margin-left: 3px; }

  .telem-bar { margin-top: 7px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; }
  .telem-bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.23,1,0.32,1); }
  .fill-green { background: var(--accent-green); box-shadow: 0 0 8px rgba(46,232,165,0.5); }
  .fill-blue  { background: var(--accent-blue);  box-shadow: 0 0 8px rgba(91,158,248,0.5); }

  .telem-sub { font-family: var(--mono); font-size: 9px; color: var(--text-secondary); margin-top: 3px; }

  /* Vision ring */
  .vision-rings { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .ring-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; color: var(--text-secondary); }
  .ring-meta p { font-size: 12px; font-weight: 400; margin-bottom: 2px; }
  .ring-meta span { font-family: var(--mono); font-size: 9px; color: var(--text-secondary); }

  /* Log */
  .log-header { margin-top: 10px; margin-bottom: 4px; flex-shrink: 0; }
  .log-feed { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .log-feed::-webkit-scrollbar { display: none; }

  .log-entry { display: flex; align-items: flex-start; gap: 7px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); animation: fadeSlide 0.35s ease; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
  .log-ts { font-family: var(--mono); font-size: 8px; color: var(--text-tertiary); flex-shrink: 0; padding-top: 1px; }
  .log-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .log-msg { font-family: var(--mono); font-size: 9px; color: var(--text-secondary); line-height: 1.4; }

  /* CONTROL PANEL */
  .control-panel { grid-area: ctrl; display: grid; grid-template-columns: 272px 1fr; gap: 10px; background: none; border: none; backdrop-filter: none; }

  .fork-visual { padding: 14px 18px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .fork-visual svg { flex: 1; }

  .path-actions { padding: 16px 20px; display: flex; flex-direction: column; }
  .path-actions-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

  .drive-mode { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.1em; }
  .mode-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-green); animation: pulse-dot 2s ease-in-out infinite; }

  .path-buttons { display: flex; gap: 9px; flex: 1; }

  .path-btn {
    flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    padding: 12px 8px; border-radius: 13px; border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: all 0.25s cubic-bezier(0.23,1,0.32,1); overflow: hidden; font-family: var(--sans);
  }
  .path-btn::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 120%, var(--btn-glow, transparent) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s; }
  .path-btn:hover::before, .path-btn.active::before { opacity: 1; }
  .path-btn:hover { border-color: var(--btn-color); background: var(--btn-surface); transform: translateY(-1px); }
  .path-btn.active { border-color: var(--btn-color); background: var(--btn-surface); box-shadow: 0 0 22px var(--btn-glow); }

  .btn-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--btn-color); border-radius: 999px 999px 0 0; opacity: 0; transition: opacity 0.25s; }
  .path-btn:hover .btn-bar, .path-btn.active .btn-bar { opacity: 1; }

  .btn-label { font-size: 9px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.12em; text-transform: uppercase; }
  .btn-dist  { font-family: var(--mono); font-size: 22px; font-weight: 300; color: var(--btn-color); letter-spacing: -0.02em; line-height: 1; }
  .btn-unit  { font-family: var(--mono); font-size: 9px; color: var(--text-secondary); }

  .btn-green  { --btn-color: #2EE8A5; --btn-glow: rgba(46,232,165,0.2);  --btn-surface: rgba(46,232,165,0.05); }
  .btn-blue   { --btn-color: #5B9EF8; --btn-glow: rgba(91,158,248,0.2);  --btn-surface: rgba(91,158,248,0.05); }
  .btn-yellow { --btn-color: #F5C842; --btn-glow: rgba(245,200,66,0.2);  --btn-surface: rgba(245,200,66,0.05); }

  .send-btn { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); color: var(--text-primary); font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); }
  .send-btn svg { opacity: 0.4; }

  .fork-path { transition: stroke 0.3s, stroke-width 0.3s, filter 0.3s; }
  .sel-green { stroke: #2EE8A5 !important; stroke-width: 2.5 !important; filter: drop-shadow(0 0 5px rgba(46,232,165,0.7)); }
  .sel-blue  { stroke: #5B9EF8 !important; stroke-width: 2.5 !important; filter: drop-shadow(0 0 5px rgba(91,158,248,0.7)); }
  .sel-yellow{ stroke: #F5C842 !important; stroke-width: 2.5 !important; filter: drop-shadow(0 0 5px rgba(245,200,66,0.7)); }
</style>
</head>
<body>
<div class="layout">

  <!-- NAV -->
  <nav class="glass">
    <div class="nav-logo"><span class="v1">Vector</span><span class="v2">Vance</span></div>
    <div class="nav-center">Mission Control</div>
    <div class="nav-right">
      <div class="status-pill"><div class="dot"></div>Online</div>
      <div class="nav-time" id="clock">--:--:--</div>
    </div>
  </nav>

  <!-- MAIN VIEWPORT -->
  <div class="main-viewport glass">
    <div class="viewport-header">
      <span class="section-label">Camera Feed</span>
      <div class="viewport-badges">
        <span class="badge">720p</span>
        <span class="badge live">● Live</span>
      </div>
    </div>
    <div class="feed-frame">
      <div class="scanline"></div>
      <!-- Swap comment below with your MJPEG/WebRTC stream -->
      <!-- <img src="http://raspberrypi.local:5000/video_feed" alt="Live Feed"> -->
      <div class="feed-placeholder">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="opacity:.15">
          <rect x="2" y="8" width="36" height="26" rx="4" stroke="white" stroke-width="1.5"/>
          <circle cx="20" cy="21" r="6" stroke="white" stroke-width="1.5"/>
          <circle cx="20" cy="21" r="2.5" fill="white" opacity="0.4"/>
          <rect x="14" y="5" width="12" height="5" rx="2" stroke="white" stroke-width="1.5"/>
        </svg>
        <p>Awaiting stream</p>
      </div>
    </div>
  </div>

  <!-- TELEMETRY -->
  <div class="telemetry glass">
    <div class="section-label" style="flex-shrink:0;margin-bottom:6px;">Telemetry</div>

    <div class="telem-block">
      <div class="telem-label">Speed</div>
      <div><span class="telem-value" id="speed">0.0</span><span class="telem-unit">cm/s</span></div>
      <div class="telem-bar"><div class="telem-bar-fill fill-green" id="speed-bar" style="width:0%"></div></div>
      <div class="telem-sub" id="speed-sub">Idle</div>
    </div>

    <div class="telem-block">
      <div class="telem-label">Ping</div>
      <div><span class="telem-value" id="ping" style="color:var(--accent-blue)">—</span><span class="telem-unit">ms</span></div>
      <div class="telem-bar"><div class="telem-bar-fill fill-blue" id="ping-bar" style="width:20%"></div></div>
      <div class="telem-sub" id="ping-sub">Excellent</div>
    </div>

    <div class="telem-block">
      <div class="telem-label">Vision</div>
      <div class="vision-rings">
        <div class="ring-wrap">
          <svg width="42" height="42" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="16" stroke="rgba(255,255,255,0.07)" stroke-width="2" fill="none"/>
            <circle cx="21" cy="21" r="16" stroke="#2EE8A5" stroke-width="2" fill="none"
              stroke-dasharray="100.5" stroke-dashoffset="25" stroke-linecap="round" id="conf-ring"/>
          </svg>
          <div class="ring-label" id="conf-label">75%</div>
        </div>
        <div class="ring-meta">
          <p>Confidence</p>
          <span>Lane tracking</span>
        </div>
      </div>
    </div>

    <div class="log-header"><span class="section-label">Activity</span></div>
    <div class="log-feed" id="log-feed"></div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="control-panel">

    <!-- Fork SVG -->
    <div class="glass fork-visual">
      <span class="section-label">Intersection</span>
      <svg viewBox="0 0 220 155" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- trunk -->
        <line x1="110" y1="150" x2="110" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="14" stroke-linecap="round"/>
        <line x1="110" y1="148" x2="110" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="6 6"/>
        <!-- left branch green -->
        <line x1="110" y1="90" x2="25" y2="22" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="round"/>
        <line x1="110" y1="90" x2="25" y2="22" stroke="rgba(46,232,165,0.12)" stroke-width="2" stroke-linecap="round" id="road-green" class="fork-path"/>
        <circle cx="25" cy="22" r="5.5" fill="rgba(46,232,165,0.1)" stroke="rgba(46,232,165,0.35)" stroke-width="1" id="node-green"/>
        <text x="5" y="18" fill="rgba(46,232,165,0.55)" font-size="7" font-family="DM Mono,monospace" letter-spacing="0.08em">40cm</text>
        <!-- center branch blue -->
        <line x1="110" y1="90" x2="110" y2="15" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="round"/>
        <line x1="110" y1="90" x2="110" y2="15" stroke="rgba(91,158,248,0.12)" stroke-width="2" stroke-linecap="round" id="road-blue" class="fork-path"/>
        <circle cx="110" cy="15" r="5.5" fill="rgba(91,158,248,0.1)" stroke="rgba(91,158,248,0.35)" stroke-width="1" id="node-blue"/>
        <text x="116" y="19" fill="rgba(91,158,248,0.55)" font-size="7" font-family="DM Mono,monospace" letter-spacing="0.08em">95cm</text>
        <!-- right branch yellow -->
        <line x1="110" y1="90" x2="195" y2="22" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="round"/>
        <line x1="110" y1="90" x2="195" y2="22" stroke="rgba(245,200,66,0.12)" stroke-width="2" stroke-linecap="round" id="road-yellow" class="fork-path"/>
        <circle cx="195" cy="22" r="5.5" fill="rgba(245,200,66,0.1)" stroke="rgba(245,200,66,0.35)" stroke-width="1" id="node-yellow"/>
        <text x="168" y="18" fill="rgba(245,200,66,0.55)" font-size="7" font-family="DM Mono,monospace" letter-spacing="0.08em">150cm</text>
        <!-- junction -->
        <circle cx="110" cy="90" r="4.5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
        <!-- robot -->
        <rect x="103" y="126" width="14" height="10" rx="3" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
        <circle cx="106" cy="137" r="2" fill="rgba(255,255,255,0.18)"/>
        <circle cx="114" cy="137" r="2" fill="rgba(255,255,255,0.18)"/>
      </svg>
    </div>

    <!-- Path Buttons -->
    <div class="glass path-actions">
      <div class="path-actions-header">
        <span class="section-label">Select Path</span>
        <div class="drive-mode"><div class="mode-dot"></div><span id="drive-status">Driving</span></div>
      </div>

      <div class="path-buttons">
        <button class="path-btn btn-green" onclick="selectPath('green')" id="btn-green">
          <div class="btn-bar"></div>
          <div class="btn-label">Alpha</div>
          <div class="btn-dist">40</div>
          <div class="btn-unit">cm</div>
        </button>
        <button class="path-btn btn-blue" onclick="selectPath('blue')" id="btn-blue">
          <div class="btn-bar"></div>
          <div class="btn-label">Beta</div>
          <div class="btn-dist">95</div>
          <div class="btn-unit">cm</div>
        </button>
        <button class="path-btn btn-yellow" onclick="selectPath('yellow')" id="btn-yellow">
          <div class="btn-bar"></div>
          <div class="btn-label">Gamma</div>
          <div class="btn-dist">150</div>
          <div class="btn-unit">cm</div>
        </button>
      </div>

      <button class="send-btn" onclick="sendPath()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6H11M11 6L7 2M11 6L7 10" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Execute Path
      </button>
    </div>
  </div>
</div>

<script>
// ── Clock ───────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US',{hour12:false});
}, 1000);
document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour12:false});

// ── Path selection ──────────────────────────────
let selected = null;

function selectPath(color) {
  selected = color;
  ['green','blue','yellow'].forEach(c => {
    document.getElementById('btn-'+c).classList.toggle('active', c===color);
    const road = document.getElementById('road-'+c);
    road.className.baseVal = 'fork-path' + (c===color ? ' sel-'+c : '');
    const ng = document.getElementById('node-'+c);
    const rgb = {green:'46,232,165', blue:'91,158,248', yellow:'245,200,66'}[c];
    ng.setAttribute('fill', `rgba(${rgb},${c===color?'0.28':'0.1'})`);
  });
  const dist = {green:'40',blue:'95',yellow:'150'}[color];
  addLog(color, `Path selected — ${dist}cm`);
}

// ── Send path ────────────────────────────────────
function sendPath() {
  if (!selected) { addLog('warn','No path selected'); return; }
  addLog('system',`Executing ${selected} path…`);
  // fetch('/api/path', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({path:selected}) })
  //   .then(r=>r.json()).then(d=>addLog('system','Confirmed: '+d.status))
  //   .catch(()=>addLog('warn','Connection error'));
  const dist = {green:'40',blue:'95',yellow:'150'}[selected];
  setTimeout(()=>addLog(selected,`Robot en route · ${dist}cm`), 600);
}

// ── Activity log ─────────────────────────────────
const logColors = { green:'#2EE8A5', blue:'#5B9EF8', yellow:'#F5C842', system:'rgba(255,255,255,0.2)', warn:'#FF6B6B' };

function addLog(type, msg) {
  const feed = document.getElementById('log-feed');
  const ts = new Date().toLocaleTimeString('en-US',{hour12:false});
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts}</span><div class="log-dot" style="background:${logColors[type]||logColors.system}"></div><span class="log-msg">${msg}</span>`;
  feed.prepend(entry);
  while(feed.children.length > 40) feed.removeChild(feed.lastChild);
}

// ── Simulated telemetry ───────────────────────────
// Replace with WebSocket / SSE from Pi:
// const ws = new WebSocket('ws://raspberrypi.local:8765');
// ws.onmessage = e => { const d = JSON.parse(e.data); applyTelemetry(d.speed, d.ping, d.confidence); };
let pingBuf = [];
function updateTelemetry() {
  const spd = (Math.random()*16+2).toFixed(1);
  document.getElementById('speed').textContent = spd;
  document.getElementById('speed-bar').style.width = Math.min(spd*4,100)+'%';
  document.getElementById('speed-sub').textContent = spd>12?'High speed':spd>6?'Cruising':'Low speed';

  const ping = Math.round(Math.random()*28+8);
  pingBuf.push(ping); if(pingBuf.length>5) pingBuf.shift();
  const avg = Math.round(pingBuf.reduce((a,b)=>a+b,0)/pingBuf.length);
  document.getElementById('ping').textContent = avg;
  document.getElementById('ping-bar').style.width = Math.min(avg*2,100)+'%';
  document.getElementById('ping-sub').textContent = avg<20?'Excellent':avg<50?'Good':'High latency';

  const conf = Math.round(Math.random()*14+72);
  const circum = 2*Math.PI*16;
  document.getElementById('conf-ring').setAttribute('stroke-dashoffset', (circum*(1-conf/100)).toFixed(1));
  document.getElementById('conf-label').textContent = conf+'%';
}
setInterval(updateTelemetry, 1800);
updateTelemetry();
